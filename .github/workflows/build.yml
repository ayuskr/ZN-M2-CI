name: ZN-M2 OpenWrt v2

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 🔥 防143核心：加Swap
    - name: Add swap
      run: |
        sudo fallocate -l 6G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget curl

    - name: Clone source
      run: |
        git clone https://github.com/immortalwrt/immortalwrt.git openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load config
      run: |
        cp config/zn-m2.config openwrt/.config

    - name: DIY
      run: |
        cd openwrt
        chmod +x ../diy/diy.sh
        ../diy/diy.sh

    - name: Download packages
      run: |
        cd openwrt
        make defconfig
        make download -j8

    # 🔥 核心：永不143
    - name: Build firmware
      run: |
        cd openwrt
        make -j1 V=s

    - name: Prepare firmware
      run: |
        cd openwrt/bin/targets/
        echo "FILE_DATE=$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

    # 🧹 删除旧 Release
    - name: Delete old Releases
      uses: dev-drprasad/delete-older-releases@v0.2.1
      with:
        keep_latest: 3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 🚀 发布 Release（重点）
    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ZN-M2-${{ env.FILE_DATE }}
        name: ZN-M2 Firmware ${{ env.FILE_DATE }}
        files: openwrt/bin/targets/**/*

      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
